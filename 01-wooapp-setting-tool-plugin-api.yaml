openapi: 3.0.3
info:
  title: WooApp Setting Tools API
  description: |
    REST API for WooApp Setting Tools WordPress plugin.
    Provides endpoints for user authentication, app banners management,
    and category position configuration.

    **Authentication**
    - **OAuth 1.0** — Required for HTTP connections (userlogin, register, category-positions)
    - **Basic Auth** — Allowed over HTTPS only (userlogin, register, category-positions)
    - **No Auth** — Banner and banner-group GET endpoints are publicly accessible
    - **Admin Auth** — Banner group POST/DELETE requires `manage_options` capability (WordPress cookie/nonce)
  version: 1.0.3
  contact:
    name: Geehootek

servers:
  - url: https://wordpress-dev.com/wp-json/wooapp/v1
    description: Development server
  - url: https://tikamall.com/wp-json/wooapp/v1
    description: Production server

tags:
  - name: Authentication
    description: User login and registration
  - name: Banner Groups
    description: Banner group management
  - name: Category Positions
    description: Category position configuration
  - name: Addresses
    description: User address management (multiple addresses per user)
  - name: Social Authentication
    description: Login/register via Google, Facebook, Apple, or Microsoft

paths:
  # ============================================
  # User Authentication
  # ============================================
  /userlogin:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate a user with username and password. Returns user profile on success.
      operationId: userLogin
      security:
        - OAuth1: []
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: kevin
                password:
                  type: string
                  format: password
                  example: Passw0rd!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                id: 1
                username: kevin
                email: kevin@example.com
                display_name: Kevin Zhu
                nickname: kevin
                first_name: Kevin
                last_name: Zhu
                phone: '1234567890'
                addresses:
                  - id: addr_6840abcd12345
                    first_name: Kevin
                    last_name: Zhu
                    company: ''
                    phone: '1234567890'
                    address_1: 123 Main St
                    address_2: Apt 4
                    city: Dubai
                    state: Dubai
                    postcode: '00000'
                    country: AE
                    is_default: true
                    created_at: '2025-06-05 12:00:00'
        '400':
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: invalid_credentials
                message: username or password is missing
                data:
                  status: 400
        '403':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: invalid_credentials
                message: invalid username or password
                data:
                  status: 403

  /register:
    post:
      tags:
        - Authentication
      summary: Customer registration
      description: |
        Register a new customer account. Username, email, password and phone are required.
        Optionally provide billing address information.
      operationId: customerRegister
      security:
        - OAuth1: []
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
                - phone
              properties:
                username:
                  type: string
                  description: Must be unique
                  example: kevin
                email:
                  type: string
                  format: email
                  description: Must be unique
                  example: kevin@example.com
                password:
                  type: string
                  format: password
                  example: Passw0rd!
                phone:
                  type: string
                  description: Must be unique
                  example: '1234567890'
                display_name:
                  type: string
                  example: Kevin Zhu
                first_name:
                  type: string
                  example: Kevin
                last_name:
                  type: string
                  example: Zhu
                billing:
                  $ref: '#/components/schemas/BillingAddress'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                id: 2
                username: newuser
                email: newuser@example.com
                display_name: New User
                nickname: newuser
                first_name: New
                last_name: User
                phone: '0987654321'
                addresses: []
        '400':
          description: Missing required fields or invalid email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              examples:
                missing_fields:
                  summary: Missing required fields
                  value:
                    code: missing_fields
                    message: username, email, password and phone are required
                    data:
                      status: 400
                invalid_email:
                  summary: Invalid email format
                  value:
                    code: invalid_email
                    message: email format is invalid
                    data:
                      status: 400
        '409':
          description: Username, email, or phone already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              examples:
                username_exists:
                  summary: Username taken
                  value:
                    code: username_exists
                    message: username already exists
                    data:
                      status: 409
                email_exists:
                  summary: Email taken
                  value:
                    code: email_exists
                    message: email already exists
                    data:
                      status: 409
                phone_exists:
                  summary: Phone taken
                  value:
                    code: phone_exists
                    message: phone already exists
                    data:
                      status: 409
        '500':
          description: User creation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'

  # ============================================
  # Social Authentication
  # ============================================
  /social-login:
    post:
      tags:
        - Social Authentication
      summary: Social login or register
      description: |
        Authenticate or register a user via a social provider (Google, Facebook, Apple, Microsoft).
        - If the social account is already linked to a user, that user is logged in (200).
        - If the email matches an existing user, the social account is linked and the user is logged in (200).
        - If no matching user exists, a new customer account is created and the social account is linked (201).

        **Token types by provider:**
        - **Google**: ID token (JWT) from Google Sign-In
        - **Facebook**: Access token from Facebook Login
        - **Apple**: ID token (JWT) from Sign in with Apple
        - **Microsoft**: Access token from Microsoft Identity Platform
        - **WeChat**: JSON string `{"access_token":"...","openid":"..."}` from WeChat OAuth2

        For Apple Sign In, `first_name` and `last_name` should be sent on the first authentication
        since Apple only provides the user's name during the initial sign-in.
      operationId: socialLogin
      security:
        - OAuth1: []
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - token
              properties:
                provider:
                  type: string
                  enum: [google, facebook, apple, microsoft, wechat]
                  description: Social authentication provider
                  example: google
                token:
                  type: string
                  description: ID token (Google/Apple), access token (Facebook/Microsoft), or JSON credentials (WeChat)
                  example: eyJhbGciOiJSUzI1NiIs...
                first_name:
                  type: string
                  description: Optional, primarily for Apple (name only sent on first auth)
                  example: Kevin
                last_name:
                  type: string
                  description: Optional, primarily for Apple
                  example: Zhu
      responses:
        '200':
          description: Login successful (existing user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialUserProfile'
              example:
                id: 1
                username: kevin
                email: kevin@example.com
                display_name: Kevin Zhu
                nickname: kevin
                first_name: Kevin
                last_name: Zhu
                phone: '1234567890'
                addresses: []
                social_accounts:
                  - provider: google
                    social_id: '115823487601098765432'
                    email: kevin@gmail.com
                    picture: 'https://lh3.googleusercontent.com/a/photo'
                    linked_at: '2026-04-09 12:00:00'
                auth_method: google
                is_new_user: false
        '201':
          description: Registration successful (new user created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialUserProfile'
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              examples:
                missing_fields:
                  summary: Missing required fields
                  value:
                    code: missing_fields
                    message: provider and token are required
                    data:
                      status: 400
                invalid_provider:
                  summary: Unsupported provider
                  value:
                    code: invalid_provider
                    message: 'Unsupported provider. Allowed: google, facebook, apple, microsoft, wechat'
                    data:
                      status: 400
        '401':
          description: Token verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: invalid_token
                message: Invalid Google token
                data:
                  status: 401

  /social-link:
    post:
      tags:
        - Social Authentication
      summary: Link social account to existing user
      description: |
        Link a social provider account to an existing WordPress/WooCommerce user.
        Verifies the provider token and creates the association.
        Returns an error if the social account is already linked to a different user.
      operationId: socialLink
      security:
        - OAuth1: []
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - provider
                - token
              properties:
                user_id:
                  type: integer
                  description: WordPress user ID
                  example: 1
                provider:
                  type: string
                  enum: [google, facebook, apple, microsoft, wechat]
                  example: facebook
                token:
                  type: string
                  description: Provider token
                  example: EAAGm0PX4ZCps...
      responses:
        '200':
          description: Social account linked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Facebook account linked successfully
                  social_accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialAccount'
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
        '409':
          description: Social account already linked to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: social_account_taken
                message: This social account is already linked to another user
                data:
                  status: 409

  /social-accounts:
    get:
      tags:
        - Social Authentication
      summary: List linked social accounts
      description: Get all social provider accounts linked to a user.
      operationId: getSocialAccounts
      security:
        - OAuth1: []
        - BasicAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
          description: WordPress user ID
          example: 1
      responses:
        '200':
          description: List of linked social accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialAccount'
                  total:
                    type: integer
                    example: 2
              example:
                success: true
                data:
                  - provider: google
                    social_id: '115823487601098765432'
                    email: kevin@gmail.com
                    picture: 'https://lh3.googleusercontent.com/a/photo'
                    linked_at: '2026-04-09 12:00:00'
                  - provider: apple
                    social_id: '001234.abcdef1234567890.1234'
                    email: kevin@privaterelay.appleid.com
                    picture: ''
                    linked_at: '2026-04-09 13:00:00'
                total: 2
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'

  /social-accounts/{provider}:
    delete:
      tags:
        - Social Authentication
      summary: Unlink social account
      description: Remove the link between a social provider account and a user.
      operationId: unlinkSocialAccount
      security:
        - OAuth1: []
        - BasicAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, facebook, apple, microsoft, wechat]
          description: Social provider to unlink
          example: facebook
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
          description: WordPress user ID
          example: 1
      responses:
        '200':
          description: Social account unlinked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Facebook account unlinked successfully
                  social_accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialAccount'
        '400':
          description: Invalid provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
        '404':
          description: User not found or account not linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              examples:
                user_not_found:
                  summary: User not found
                  value:
                    code: user_not_found
                    message: User not found
                    data:
                      status: 404
                not_linked:
                  summary: Account not linked
                  value:
                    code: not_linked
                    message: Facebook account is not linked
                    data:
                      status: 404

  # ============================================
  # Addresses
  # ============================================
  /addresses:
    get:
      tags:
        - Addresses
      summary: Get all addresses for a user
      security:
        - OAuth1: []
        - BasicAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: WordPress user ID
      responses:
        '200':
          description: List of addresses
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Address'
                  total:
                    type: integer
                    example: 2
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
    post:
      tags:
        - Addresses
      summary: Add a new address
      security:
        - OAuth1: []
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - user_id
                    - address_1
                    - country
                  properties:
                    user_id:
                      type: integer
                      example: 1
                    is_default:
                      type: boolean
                      example: true
                - $ref: '#/components/schemas/AddressFields'
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Address added successfully
                  data:
                    $ref: '#/components/schemas/Address'
        '400':
          description: Missing required fields or invalid user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'

  /addresses/{id}:
    put:
      tags:
        - Addresses
      summary: Update an existing address
      security:
        - OAuth1: []
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Address ID (e.g. addr_6840abcd12345)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - user_id
                  properties:
                    user_id:
                      type: integer
                      example: 1
                    is_default:
                      type: boolean
                - $ref: '#/components/schemas/AddressFields'
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Address updated successfully
                  data:
                    $ref: '#/components/schemas/Address'
        '400':
          description: Invalid user_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
        '404':
          description: Address not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
    delete:
      tags:
        - Addresses
      summary: Delete an address
      security:
        - OAuth1: []
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Address ID (e.g. addr_6840abcd12345)
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
          description: WordPress user ID
      responses:
        '200':
          description: Address deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Address deleted successfully
        '400':
          description: Invalid user_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
        '404':
          description: Address not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'

  # ============================================
  # Banners
  # ============================================
  /banners:
    get:
      tags:
        - Banner Groups
      summary: Get all banners
      description: |
        Retrieve all banners. Optionally filter by group key.
        Only banners with an image_url are returned.
      operationId: getBanners
      parameters:
        - name: group
          in: query
          required: false
          description: Filter banners by group key
          schema:
            type: string
            example: default
      responses:
        '200':
          description: Banners retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Banner'
                  total:
                    type: integer
                    example: 4
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: internal_error
                message: An unexpected error occurred
                data:
                  status: 500

  /banners/{id}:
    get:
      tags:
        - Banner Groups
      summary: Get a single banner
      description: Retrieve a specific banner by its ID.
      operationId: getBanner
      parameters:
        - name: id
          in: path
          required: true
          description: Banner ID
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]+$'
            example: banner_1775330415604
      responses:
        '200':
          description: Banner found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Banner'
              example:
                success: true
                data:
                  id: banner_1775330415604
                  group: default
                  group_label: Default
                  image_id: 72
                  image_url: https://example.com/wp-content/uploads/2025/12/banner.jpg
                  deeplink: ''
                  order: 0
                  created_at: '2026-04-04 23:20:15'
                  updated_at: '2026-04-04 23:20:15'
        '404':
          description: Banner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: banner_not_found
                message: Banner not found.
                data:
                  status: 404
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: internal_error
                message: An unexpected error occurred
                data:
                  status: 500

  # ============================================
  # Banner Groups
  # ============================================
  /banner-groups:
    get:
      tags:
        - Banner Groups
      summary: Get all banner groups
      description: Retrieve all banner groups with their keys and labels.
      operationId: getBannerGroups
      responses:
        '200':
          description: Banner groups retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BannerGroup'
                  total:
                    type: integer
                    example: 2
              example:
                success: true
                data:
                  - banner_group_key: default
                    label: Default
                    banners:
                      - id: banner_1775330415604
                        group: default
                        group_label: Default
                        image_id: 101
                        image_url: https://example.com/wp-content/uploads/banner1.jpg
                        deeplink: /product/123
                        order: 0
                        created_at: '2025-06-01 10:00:00'
                        updated_at: '2025-06-02 12:00:00'
                  - banner_group_key: home-page-main
                    label: Home Page Main
                    banners: []
                total: 2
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: internal_error
                message: An unexpected error occurred
                data:
                  status: 500

  /banner-groups/{banner_group_key}:
    get:
      tags:
        - Banner Groups
      summary: Get a specific banner group
      description: Retrieve a single banner group by key, including its banners.
      operationId: getBannerGroup
      parameters:
        - name: banner_group_key
          in: path
          required: true
          description: Banner group key
          schema:
            type: string
            pattern: '^[\w-]+$'
            example: default
      responses:
        '200':
          description: Banner group found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/BannerGroup'
              example:
                success: true
                data:
                  banner_group_key: default
                  label: Default
                  banners:
                    - id: banner_1775330415604
                      group: default
                      group_label: Default
                      image_id: 101
                      image_url: https://example.com/wp-content/uploads/banner1.jpg
                      deeplink: /product/123
                      order: 0
                      created_at: '2025-06-01 10:00:00'
                      updated_at: '2025-06-02 12:00:00'
        '404':
          description: Banner group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: group_not_found
                message: Banner group not found.
                data:
                  status: 404
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: internal_error
                message: An unexpected error occurred
                data:
                  status: 500

  # ============================================
  # Category Positions
  # ============================================
  /category-positions:
    get:
      tags:
        - Category Positions
      summary: Get all category positions
      description: |
        Retrieve all category positions with their labels and assigned categories.
        Each category includes id, name, and slug.
      operationId: getCategoryPositions
      security:
        - OAuth1: []
        - BasicAuth: []
      responses:
        '200':
          description: Category positions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/CategoryPosition'
                  total:
                    type: integer
                    example: 2
              example:
                success: true
                data:
                  banner:
                    label: Banner Section
                    category_ids: [15, 23]
                    categories:
                      - id: 15
                        name: Electronics
                        slug: electronics
                      - id: 23
                        name: Clothing
                        slug: clothing
                  featured:
                    label: Featured Products
                    category_ids: [15]
                    categories:
                      - id: 15
                        name: Electronics
                        slug: electronics
                total: 2
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: internal_error
                message: An unexpected error occurred
                data:
                  status: 500

  /category-positions/{position_key}:
    get:
      tags:
        - Category Positions
      summary: Get categories for a specific position
      description: Retrieve the label and assigned categories for a single position.
      operationId: getPositionCategories
      security:
        - OAuth1: []
        - BasicAuth: []
      parameters:
        - name: position_key
          in: path
          required: true
          description: Position key identifier
          schema:
            type: string
            pattern: '^[\w-]+$'
            example: banner
      responses:
        '200':
          description: Position found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/CategoryPosition'
              example:
                success: true
                data:
                  label: Banner Section
                  category_ids: [15]
                  categories:
                    - id: 15
                      name: Electronics
                      slug: electronics
        '404':
          description: Position not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: position_not_found
                message: Position not found
                data:
                  status: 404
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WPError'
              example:
                code: internal_error
                message: An unexpected error occurred
                data:
                  status: 500

# ============================================
# Components
# ============================================
components:
  securitySchemes:
    OAuth1:
      type: http
      scheme: oauth
      description: |
        OAuth 1.0 authentication using WooCommerce consumer key/secret.
        Required for HTTP connections. Uses HMAC-SHA256 signature method.
    BasicAuth:
      type: http
      scheme: basic
      description: |
        Basic authentication using WooCommerce consumer key (username)
        and consumer secret (password). Only allowed over HTTPS.

  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: kevin
        email:
          type: string
          format: email
          example: kevin@example.com
        display_name:
          type: string
          example: Kevin Zhu
        nickname:
          type: string
          example: kevin
        first_name:
          type: string
          example: Kevin
        last_name:
          type: string
          example: Zhu
        phone:
          type: string
          example: '1234567890'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'

    SocialUserProfile:
      description: User profile returned by social login, extends UserProfile with social fields
      allOf:
        - $ref: '#/components/schemas/UserProfile'
        - type: object
          properties:
            social_accounts:
              type: array
              description: All social provider accounts linked to this user
              items:
                $ref: '#/components/schemas/SocialAccount'
            auth_method:
              type: string
              description: The authentication method used for this login
              enum: [google, facebook, apple, microsoft, wechat]
              example: google
            is_new_user:
              type: boolean
              description: Whether a new account was created during this request
              example: false

    SocialAccount:
      type: object
      description: A linked social provider account
      properties:
        provider:
          type: string
          enum: [google, facebook, apple, microsoft, wechat]
          description: Social provider name
          example: google
        social_id:
          type: string
          description: User ID from the social provider
          example: '115823487601098765432'
        email:
          type: string
          format: email
          description: Email from the social provider
          example: kevin@gmail.com
        picture:
          type: string
          description: Profile picture URL from the social provider
          example: 'https://lh3.googleusercontent.com/a/photo'
        linked_at:
          type: string
          description: When the social account was linked
          example: '2026-04-09 12:00:00'

    Banner:
      type: object
      properties:
        id:
          type: string
          description: Unique banner ID
          example: banner_1775330415604
        group:
          type: string
          description: Group key this banner belongs to
          example: default
        group_label:
          type: string
          description: Display label of the group
          example: Default
        image_id:
          type: integer
          description: WordPress media attachment ID
          example: 72
        image_url:
          type: string
          format: uri
          description: Full URL to the banner image
          example: https://example.com/wp-content/uploads/2025/12/banner.jpg
        deeplink:
          type: string
          description: Deep link URL for banner tap action
          example: 'myapp://product/123'
        order:
          type: integer
          description: Display order within the group (0-based)
          example: 0
        created_at:
          type: string
          description: Creation timestamp
          example: '2026-04-04 23:20:15'
        updated_at:
          type: string
          description: Last update timestamp
          example: '2026-04-04 23:20:15'

    BannerGroup:
      type: object
      properties:
        banner_group_key:
          type: string
          description: Unique group key (auto-generated from label)
          example: home-page-main
        label:
          type: string
          description: Display name of the group
          example: Home Page Main
        banners:
          type: array
          description: Banners belonging to this group (only those with an image)
          items:
            $ref: '#/components/schemas/Banner'

    CategoryPosition:
      type: object
      properties:
        label:
          type: string
          description: Display name of the position
          example: Banner Section
        category_ids:
          type: array
          description: Raw list of assigned category IDs
          items:
            type: integer
          example: [15, 23]
        categories:
          type: array
          description: Assigned product categories with details
          items:
            $ref: '#/components/schemas/Category'

    Category:
      type: object
      properties:
        id:
          type: integer
          description: WooCommerce product category term ID
          example: 15
        name:
          type: string
          description: Category display name
          example: Electronics
        slug:
          type: string
          description: Category URL slug
          example: electronics

    BillingAddress:
      type: object
      description: WooCommerce billing address fields
      properties:
        first_name:
          type: string
          example: Kevin
        last_name:
          type: string
          example: Zhu
        company:
          type: string
        address_1:
          type: string
          example: Some street 1
        address_2:
          type: string
        city:
          type: string
          example: Dubai
        state:
          type: string
        postcode:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: AE
        email:
          type: string
          format: email
        phone:
          type: string
          example: '12345678'

    AddressFields:
      type: object
      properties:
        first_name:
          type: string
          example: Kevin
        last_name:
          type: string
          example: Zhu
        company:
          type: string
        phone:
          type: string
          example: '1234567890'
        address_1:
          type: string
          example: 123 Main St
        address_2:
          type: string
          example: Apt 4
        city:
          type: string
          example: Dubai
        state:
          type: string
          example: Dubai
        postcode:
          type: string
          example: '00000'
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: AE

    Address:
      allOf:
        - type: object
          properties:
            id:
              type: string
              description: Unique address identifier
              example: addr_6840abcd12345
            is_default:
              type: boolean
              example: true
            created_at:
              type: string
              format: date-time
              example: '2025-06-05 12:00:00'
        - $ref: '#/components/schemas/AddressFields'

    WPError:
      type: object
      description: WordPress REST API error response
      properties:
        code:
          type: string
          example: invalid_credentials
        message:
          type: string
          example: invalid username or password
        data:
          type: object
          properties:
            status:
              type: integer
              example: 403
